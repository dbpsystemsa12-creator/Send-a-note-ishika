<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drop a Note ❤️</title>
    
    <!-- PWA Requirements -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f43f5e">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configure Tailwind for Dark Mode and Custom Animations -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'blob': 'blob 7s infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Enhanced Glass Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* Smooth button presses */
        .btn-press {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-press:active {
            transform: scale(0.96);
        }

        /* Animation Delays for Blobs */
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        /* Custom Scrollbars for Textarea and History */
        .custom-scrollbar::-webkit-scrollbar, textarea::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track, textarea::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb, textarea::-webkit-scrollbar-thumb { background: rgba(244, 63, 94, 0.5); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen bg-slate-100 dark:bg-slate-900 transition-colors duration-500 flex items-center justify-center py-12 px-4 relative overflow-x-hidden">

    <!-- Playful Background Blobs -->
    <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-400 dark:bg-purple-900 rounded-full mix-blend-multiply dark:mix-blend-lighten filter blur-2xl opacity-60 animate-blob pointer-events-none"></div>
    <div class="absolute top-0 -right-4 w-72 h-72 bg-rose-400 dark:bg-rose-900 rounded-full mix-blend-multiply dark:mix-blend-lighten filter blur-2xl opacity-60 animate-blob animation-delay-2000 pointer-events-none"></div>
    <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-400 dark:bg-pink-900 rounded-full mix-blend-multiply dark:mix-blend-lighten filter blur-2xl opacity-60 animate-blob animation-delay-4000 pointer-events-none"></div>

    <!-- ================== LOGIN SCREEN ================== -->
    <div id="login-screen" class="glass-panel w-full max-w-sm rounded-[2rem] p-8 relative z-20 text-center transition-all duration-700 transform">
        <div class="mx-auto w-20 h-20 bg-gradient-to-br from-rose-100 to-pink-100 dark:from-rose-900/50 dark:to-pink-900/50 rounded-full flex items-center justify-center mb-6 shadow-inner relative overflow-hidden">
            <div class="absolute inset-0 bg-rose-400/20 animate-pulse-slow"></div>
            <i data-lucide="heart-lock" class="w-10 h-10 text-rose-500 dark:text-rose-400 relative z-10"></i>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-800 dark:text-white mb-2 tracking-tight">Secret Connection</h2>
        <p class="text-sm text-slate-500 dark:text-slate-400 mb-8">Enter our special date to unlock.</p>
        
        <div class="relative mb-6">
            <input type="password" id="passInput" class="w-full bg-white/50 dark:bg-slate-900/50 border-2 border-slate-200 dark:border-slate-700/50 rounded-2xl p-4 text-center text-lg font-medium text-slate-800 dark:text-white focus:outline-none focus:border-rose-400 focus:ring-0 transition-all tracking-[0.2em] shadow-inner" placeholder="DD/MM/YYYY">
        </div>
        
        <button id="loginBtn" class="btn-press w-full bg-gradient-to-r from-rose-500 to-pink-600 hover:from-rose-400 hover:to-pink-500 text-white font-bold text-lg py-4 rounded-2xl shadow-xl shadow-rose-500/30 tracking-wide">
            Unlock
        </button>
        <p id="loginError" class="text-sm text-rose-500 dark:text-rose-400 mt-4 font-medium opacity-0 transition-opacity duration-300">Incorrect date. Try again! ❤️</p>
    </div>

    <!-- ================== MAIN APP (HIDDEN INITIALLY) ================== -->
    <div id="main-app" class="hidden glass-panel w-full max-w-sm rounded-[2rem] p-6 relative z-10 transition-all duration-700 opacity-0 transform translate-y-4">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-xl font-extrabold text-slate-800 dark:text-white flex items-center gap-2 tracking-tight transition-colors duration-500">
                    <div class="p-2 bg-rose-100 dark:bg-rose-900/40 rounded-xl">
                        <i data-lucide="mail-heart" class="w-5 h-5 text-rose-500"></i>
                    </div>
                    Drop a Note
                </h1>
                <p class="text-xs font-semibold text-slate-500 dark:text-slate-400 mt-2 flex items-center gap-1.5" id="connection-status">
                    <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse shadow-[0_0_8px_rgba(250,204,21,0.6)]"></span>
                    Connecting to desk...
                </p>
            </div>
            
            <!-- Dark Mode Toggle -->
            <button id="themeToggle" class="btn-press p-2.5 rounded-xl bg-white/50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-600 shadow-sm transition-all">
                <i data-lucide="moon" id="moonIcon" class="w-5 h-5 hidden dark:block"></i>
                <i data-lucide="sun" id="sunIcon" class="w-5 h-5 block dark:hidden"></i>
            </button>
        </div>

        <!-- Inline Notification Banner -->
        <div id="notification-banner" class="hidden opacity-0 -translate-y-2 transform transition-all duration-500 mb-6 rounded-2xl bg-gradient-to-r from-rose-100 to-pink-100 dark:from-rose-900/40 dark:to-pink-900/40 border border-rose-200 dark:border-rose-800 p-4 flex items-center gap-4 shadow-inner">
            <div id="notif-icon-container" class="relative">
                <i id="notif-icon" data-lucide="heart" class="w-7 h-7 text-rose-500 fill-rose-500 animate-bounce relative z-10 filter drop-shadow-md"></i>
                <div class="absolute inset-0 bg-rose-400 blur-xl opacity-60 rounded-full animate-pulse"></div>
            </div>
            <div class="flex-1">
                <h3 id="notif-title" class="font-bold text-slate-800 dark:text-rose-100 text-sm tracking-tight">Ding! 💖</h3>
                <p id="notif-desc" class="text-xs text-slate-600 dark:text-rose-200/80 font-medium mt-0.5">He is thinking about you right now!</p>
            </div>
            <button id="closeNotifBtn" class="text-slate-400 hover:text-rose-500 transition-colors p-1">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>

        <!-- Text Message Section -->
        <div class="mb-6 relative">
            <div class="relative">
                <textarea id="messageInput" rows="3" 
                    class="w-full bg-white/50 dark:bg-slate-900/50 border-2 border-slate-200 dark:border-slate-700/50 rounded-2xl p-4 pb-8 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:border-rose-400 transition-all shadow-inner font-medium resize-none custom-scrollbar"
                    placeholder="helloo jaanuu..."></textarea>
                
                <!-- Character Counter -->
                <div class="absolute bottom-3 right-3 text-xs font-bold text-slate-400 dark:text-slate-500" id="charCounter">0/4 Lines</div>
                <!-- Clear Button -->
                <button id="clearBtn" class="absolute bottom-2.5 left-3 text-xs font-bold text-slate-400 hover:text-rose-500 transition-colors hidden">Clear</button>
            </div>
                
            <button id="sendMsgBtn" class="btn-press mt-4 w-full bg-gradient-to-r from-rose-500 to-pink-600 text-white font-bold text-lg py-4 rounded-2xl shadow-xl shadow-rose-500/30 flex items-center justify-center gap-2 group transition-all">
                <i data-lucide="send" class="w-5 h-5 group-hover:-translate-y-1 group-hover:translate-x-1 transition-transform"></i>
                <span id="sendBtnText">Send to his screen</span>
            </button>
        </div>

        <!-- Buzzer Section -->
        <div class="mt-4 pt-6 border-t-2 border-slate-200/60 dark:border-slate-700/60 transition-colors duration-500">
            <button id="buzzBtn" class="btn-press w-full bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-white font-bold text-lg py-4 rounded-2xl shadow-xl shadow-orange-500/30 flex items-center justify-center gap-2 group transition-all">
                <i id="buzzBtnIcon" data-lucide="bell-ring" class="w-6 h-6 group-hover:animate-wiggle"></i>
                <span id="buzzBtnText">Buzz His Desk!</span>
            </button>
        </div>

        <!-- NEW: History / Activity Log Section -->
        <div class="mt-6 pt-5 border-t-2 border-slate-200/60 dark:border-slate-700/60 transition-colors duration-500">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-bold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                    <i data-lucide="history" class="w-4 h-4 text-slate-500"></i> Activity Log
                </h3>
                <button id="clearHistoryBtn" class="text-xs font-semibold text-slate-400 hover:text-rose-500 transition-colors hidden">Clear</button>
            </div>
            
            <div id="historyLog" class="custom-scrollbar max-h-36 overflow-y-auto space-y-2 pr-1">
                <p id="emptyHistory" class="text-xs text-slate-400 text-center py-4 italic">No activity yet</p>
                <!-- Log entries will be inserted here dynamically -->
            </div>
        </div>
    </div>

    <!-- Firebase SDK & App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // UI Initialization
        lucide.createIcons();

        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
        } else {
            htmlElement.classList.remove('dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            localStorage.theme = htmlElement.classList.contains('dark') ? 'dark' : 'light';
        });

        // UI Elements
        const messageInput = document.getElementById('messageInput');
        const charCounter = document.getElementById('charCounter');
        const clearBtn = document.getElementById('clearBtn');
        const sendBtnText = document.getElementById('sendBtnText');
        const sendMsgBtn = document.getElementById('sendMsgBtn');
        const buzzBtn = document.getElementById('buzzBtn');
        const buzzBtnIcon = document.getElementById('buzzBtnIcon');
        const buzzBtnText = document.getElementById('buzzBtnText');

        // Notification Banner Elements
        const notifBanner = document.getElementById('notification-banner');
        const notifIcon = document.getElementById('notif-icon');
        const notifTitle = document.getElementById('notif-title');
        const notifDesc = document.getElementById('notif-desc');
        const closeNotifBtn = document.getElementById('closeNotifBtn');
        let notifTimeout;

        function closeNotification() {
            notifBanner.classList.remove('opacity-100', 'translate-y-0');
            notifBanner.classList.add('opacity-0', '-translate-y-2');
            setTimeout(() => { notifBanner.classList.add('hidden'); }, 500);
        }

        closeNotifBtn.addEventListener('click', closeNotification);

        function showNotification(title, desc, iconName, colorClass) {
            clearTimeout(notifTimeout);
            notifTitle.textContent = title;
            notifDesc.textContent = desc;
            
            notifIcon.setAttribute('data-lucide', iconName);
            notifIcon.className = `w-7 h-7 relative z-10 filter drop-shadow-md ${colorClass}`;
            lucide.createIcons();
            
            notifBanner.classList.remove('hidden');
            setTimeout(() => {
                notifBanner.classList.remove('opacity-0', '-translate-y-2');
                notifBanner.classList.add('opacity-100', 'translate-y-0');
            }, 10);
            
            notifTimeout = setTimeout(closeNotification, 8000);
        }

        // ================== HISTORY LOGIC ==================
        const historyLog = document.getElementById('historyLog');
        const emptyHistory = document.getElementById('emptyHistory');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        function renderAllHistory() {
            const history = JSON.parse(localStorage.getItem('loveBoxHistory') || '[]');
            
            // Remove existing dynamic items so we don't duplicate
            document.querySelectorAll('.history-item').forEach(el => el.remove());
            
            if (history.length > 0) {
                emptyHistory.style.display = 'none';
                clearHistoryBtn.classList.remove('hidden');
                
                history.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item flex items-center justify-between p-2.5 rounded-xl bg-white/40 dark:bg-slate-800/40 text-sm border border-white/20 dark:border-slate-700/30 shadow-sm';
                    div.innerHTML = `
                        <div class="flex items-center gap-2.5">
                            <i data-lucide="${item.icon}" class="w-4 h-4 ${item.color}"></i>
                            <span class="text-slate-700 dark:text-slate-300 font-medium">${item.action}</span>
                        </div>
                        <span class="text-xs text-slate-400 font-bold">${item.time}</span>
                    `;
                    historyLog.appendChild(div);
                });
                lucide.createIcons();
            } else {
                emptyHistory.style.display = 'block';
                clearHistoryBtn.classList.add('hidden');
            }
        }

        function addHistory(action, icon, color) {
            // Get current local time nicely formatted (e.g. 2:15 PM)
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const item = { action, icon, color, time };
            
            let history = JSON.parse(localStorage.getItem('loveBoxHistory') || '[]');
            history.unshift(item); // Add newest to the top
            if(history.length > 20) history.pop(); // Keep only the last 20 items to save space
            
            localStorage.setItem('loveBoxHistory', JSON.stringify(history));
            renderAllHistory(); // Re-draw list
        }

        clearHistoryBtn.addEventListener('click', () => {
            localStorage.removeItem('loveBoxHistory');
            renderAllHistory();
        });

        // --- Smart LCD Simulation Logic ---
        function isTextTooLongForLCD(text) {
            text = text.replace(/[\n\r]/g, " ");
            let row = 0; let col = 0; let i = 0;

            while (i < text.length && row < 4) {
                if (col === 0) {
                    while (i < text.length && text[i] === ' ') i++;
                    if (i >= text.length) break;
                }

                let nextSpace = text.indexOf(' ', i);
                let wordLen = (nextSpace === -1) ? (text.length - i) : (nextSpace - i);

                if (wordLen > 20) {
                    let spaceLeft = 20 - col;
                    i += spaceLeft;
                    row++;
                    col = 0;
                    continue;
                }

                if (col + wordLen <= 20) {
                    col += wordLen;
                    i += wordLen;
                    if (col < 20 && i < text.length && text[i] === ' ') {
                        col++; i++;
                    }
                } else {
                    row++; col = 0;
                }
            }
            return i < text.length; 
        }

        // Character Counter & Clear Button Logic
        messageInput.addEventListener('input', function() {
            const text = this.value;
            const isTooLong = isTextTooLongForLCD(text);
            
            if(isTooLong) {
                charCounter.textContent = "Too long! ⚠️";
                charCounter.classList.remove('text-slate-400', 'dark:text-slate-500');
                charCounter.classList.add('text-rose-500');
                sendMsgBtn.disabled = true;
                sendMsgBtn.classList.add('opacity-50', 'cursor-not-allowed', 'grayscale');
            } else {
                charCounter.textContent = "Fits on LCD ✓";
                charCounter.classList.add('text-slate-400', 'dark:text-slate-500');
                charCounter.classList.remove('text-rose-500');
                sendMsgBtn.disabled = false;
                sendMsgBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'grayscale');
            }

            if(text.length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
                charCounter.textContent = "0/4 Lines";
            }
        });

        messageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); 
                if(!sendMsgBtn.disabled) sendMsgBtn.click(); 
            }
        });

        clearBtn.addEventListener('click', () => {
            messageInput.value = '';
            charCounter.textContent = '0/4 Lines';
            charCounter.classList.remove('text-rose-500');
            charCounter.classList.add('text-slate-400', 'dark:text-slate-500');
            clearBtn.classList.add('hidden');
            sendMsgBtn.disabled = false;
            sendMsgBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'grayscale');
            messageInput.focus();
        });

        // ================== LOGIN LOGIC ==================
        const loginBtn = document.getElementById('loginBtn');
        const passInput = document.getElementById('passInput');
        
        function showMainApp() {
            const loginScreen = document.getElementById('login-screen');
            const mainApp = document.getElementById('main-app');
            
            loginScreen.style.opacity = '0';
            loginScreen.style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                void mainApp.offsetWidth; 
                mainApp.style.opacity = '1';
                mainApp.style.transform = 'translateY(0)';
            }, 400); 
        }

        if (localStorage.getItem('isAuthenticated') === 'true') {
            document.getElementById('login-screen').classList.add('hidden');
            const mainApp = document.getElementById('main-app');
            mainApp.classList.remove('hidden');
            mainApp.style.opacity = '1';
            mainApp.style.transform = 'translateY(0)';
            initFirebase();
        }

        loginBtn.addEventListener('click', attemptLogin);
        passInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') attemptLogin(); });

        function attemptLogin() {
            if (passInput.value === "17/01/2024") {
                localStorage.setItem('isAuthenticated', 'true');
                showMainApp();
                initFirebase();
            } else {
                const errorText = document.getElementById('loginError');
                errorText.style.opacity = '1';
                passInput.classList.add('border-rose-500');
                setTimeout(() => {
                    errorText.style.opacity = '0';
                    passInput.classList.remove('border-rose-500');
                }, 2000);
            }
        }

        // ================== FIREBASE LOGIC ==================
        function initFirebase() {
            const firebaseConfig = {
                apiKey: "AIzaSyDr0plgf2AdJZjhofO8khaN7nmag_bviNI",
                authDomain: "ishi-device.firebaseapp.com",
                databaseURL: "https://ishi-device-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "ishi-device",
                storageBucket: "ishi-device.firebasestorage.app",
                messagingSenderId: "360047105285",
                appId: "1:360047105285:web:4bd5f57ed7b1974e5a136c"
            };

            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const auth = getAuth(app);

            // Draw history upon login
            renderAllHistory();

            signInAnonymously(auth).then(() => {
                document.getElementById('connection-status').innerHTML = '<span class="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.8)]"></span> Connected securely';
                
                // 1. Send Text
                sendMsgBtn.addEventListener('click', () => {
                    const msg = messageInput.value;
                    if(msg.trim() === "" || isTextTooLongForLCD(msg)) return;
                    
                    sendBtnText.textContent = "Sending...";
                    sendMsgBtn.classList.add('opacity-80', 'cursor-not-allowed');
                    sendMsgBtn.disabled = true;

                    set(ref(db, 'messages/text'), msg).then(() => {
                        // LOG HISTORY
                        addHistory("Sent a sweet note", "mail", "text-rose-500");

                        sendBtnText.textContent = "Delivered! ✓";
                        messageInput.value = ""; 
                        charCounter.textContent = "0/4 Lines";
                        clearBtn.classList.add('hidden');
                        
                        setTimeout(() => {
                            sendBtnText.textContent = "Send to his screen";
                            sendMsgBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                            sendMsgBtn.disabled = false;
                        }, 2000);
                    });
                });

                // 2. Trigger Buzzer
                buzzBtn.addEventListener('click', () => {
                    set(ref(db, 'commands/buzz'), true);
                    
                    // LOG HISTORY
                    addHistory("Buzzed his desk", "bell-ring", "text-amber-500");
                    
                    buzzBtnText.textContent = 'Desk Alerted!';
                    buzzBtnIcon.setAttribute('data-lucide', 'check');
                    lucide.createIcons();
                    
                    setTimeout(() => {
                        if(buzzBtnText.textContent === 'Desk Alerted!') {
                            buzzBtnText.textContent = 'Buzz His Desk!';
                            buzzBtnIcon.setAttribute('data-lucide', 'bell-ring');
                            lucide.createIcons();
                        }
                    }, 3000);
                });

                // 3. Listen to physical button press from ESP32
                onValue(ref(db, 'status/reply'), (snapshot) => {
                    const status = snapshot.val();
                    if (status === "heart_burst") {
                        showNotification("Ding! 💖", "He is thinking about you right now!", "heart", "text-rose-500 fill-rose-500 animate-bounce");
                        
                        // LOG HISTORY
                        addHistory("He thought of you", "heart", "text-pink-500 fill-pink-500");
                        
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
                    
                    } else if (status === "buzz_stopped") {
                        showNotification("He got it! ✨", "He turned off the desk alarm.", "check-circle-2", "text-emerald-500 fill-emerald-100");
                        
                        // LOG HISTORY
                        addHistory("He stopped the alarm", "check-circle-2", "text-emerald-500");
                        
                        if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
                        
                        buzzBtnText.textContent = 'Alarm Stopped! ✓';
                        buzzBtnIcon.setAttribute('data-lucide', 'check-circle-2');
                        buzzBtn.classList.remove('from-amber-400', 'to-orange-500', 'hover:from-amber-500', 'hover:to-orange-600', 'shadow-orange-500/30');
                        buzzBtn.classList.add('from-emerald-400', 'to-green-500', 'hover:from-emerald-500', 'hover:to-green-600', 'shadow-emerald-500/30');
                        lucide.createIcons();
                        
                        setTimeout(() => {
                            buzzBtnText.textContent = 'Buzz His Desk!';
                            buzzBtnIcon.setAttribute('data-lucide', 'bell-ring');
                            buzzBtn.classList.add('from-amber-400', 'to-orange-500', 'hover:from-amber-500', 'hover:to-orange-600', 'shadow-orange-500/30');
                            buzzBtn.classList.remove('from-emerald-400', 'to-green-500', 'hover:from-emerald-500', 'hover:to-green-600', 'shadow-emerald-500/30');
                            lucide.createIcons();
                        }, 5000);
                    }
                });

            }).catch((error) => {
                console.error("Auth Error:", error);
                document.getElementById('connection-status').innerHTML = '<span class="w-2.5 h-2.5 rounded-full bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.8)]"></span> Connection Failed';
            });
        }

        // --- PWA Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('SW registered');
                }).catch(err => {
                    console.log('SW registration failed');
                });
            });
        }
    </script>
</body>
</html>
